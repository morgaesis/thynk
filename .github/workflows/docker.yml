name: Docker Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Extract version
        id: version
        run: echo "version=$(node -e \"console.log(require('./frontend/package.json').version)\")" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.version }}

  validate:
    name: Validate Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: thynk-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name thynk-test -p 3001:3000 -v thynk-test-data:/data thynk-test:latest

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs thynk-test
          exit 1

      - name: Validate server responds
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/)
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 404 ]; then
            echo "Server responded with HTTP $RESPONSE"
          else
            echo "Unexpected HTTP response: $RESPONSE"
            docker logs thynk-test
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f thynk-test && docker volume rm thynk-test-data 2>/dev/null || true
