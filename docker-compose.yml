services:
  thynk:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - thynk-data:/data
    environment:
      - THYNK_DATA_DIR=/data
      - THYNK_FRONTEND_DIR=/app/frontend/dist
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  thynk-data:
